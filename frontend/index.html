<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>osmosis</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Nav -->
    <nav id="nav">
      <div class="nav-brand">osmosis</div>
      <div class="nav-links">
        <a href="#/" class="nav-link active" data-page="chat">chat</a>
        <a href="#/review" class="nav-link" data-page="review">review</a>
        <a href="#/goals" class="nav-link" data-page="goals">goals</a>
        <a href="#/settings" class="nav-link" data-page="settings">settings</a>
      </div>
      <div class="nav-right">
        <button id="notification-bell" class="icon-btn" title="Notifications">
          <span class="bell-icon">&#128276;</span>
          <span id="notif-count" class="badge" hidden>0</span>
        </button>
        <div id="cat-status-mini"></div>
      </div>
    </nav>

    <!-- Notification dropdown -->
    <div id="notif-panel" class="notif-panel" hidden>
      <div class="notif-header">
        <span>Notifications</span>
        <button id="notif-read-all">mark all read</button>
      </div>
      <div id="notif-list"></div>
    </div>

    <!-- Pages -->
    <main id="main">
      <!-- Chat page -->
      <div id="page-chat" class="page active">
        <div id="cat-area">
          <div id="cat-display"></div>
          <button id="groom-btn" class="btn btn-groom" hidden>groom</button>
        </div>
        <div id="chat-messages"></div>
        <form id="chat-form">
          <input type="text" id="chat-input" placeholder="say something..." autocomplete="off">
          <button type="submit" class="btn">send</button>
          <button type="button" id="clear-memory-btn" class="btn btn-danger btn-small" hidden title="Clear conversation summary">clear memory</button>
        </form>
      </div>

      <!-- Review page -->
      <div id="page-review" class="page">
        <div id="review-stats">
          <span id="review-stats-text"></span>
          <button id="delete-all-btn" class="btn btn-danger btn-small" hidden>delete all cards</button>
        </div>
        <div id="flashcard-area">
          <div id="flashcard" class="flashcard">
            <div class="flashcard-inner">
              <div class="flashcard-front">
                <span class="card-word"></span>
                <span class="card-context"></span>
              </div>
              <div class="flashcard-back"></div>
            </div>
          </div>

          <!-- Answer input area (visible before flip) -->
          <div id="answer-area">
            <div class="answer-input-row">
              <input type="text" id="answer-input" placeholder="type your answer..." autocomplete="off">
              <button type="button" id="mic-btn" class="btn icon-btn" title="Record answer">🎤</button>
            </div>
          </div>

          <!-- Pre-flip actions -->
          <div id="preflip-actions">
            <button id="flip-btn" class="btn">flip ↓</button>
          </div>

          <!-- Evaluation result (shown after flip when answer was given) -->
          <div id="eval-panel" hidden>
            <div id="eval-explanation"></div>
          </div>

          <div id="rating-buttons" hidden>
            <button class="btn btn-rating" data-rating="1">again</button>
            <button class="btn btn-rating" data-rating="2">hard</button>
            <button class="btn btn-rating" data-rating="3">good</button>
            <button id="easy-postflip-btn" class="btn btn-rating" data-rating="4">easy</button>
          </div>
          <div id="card-actions" hidden>
            <button id="speak-btn" class="btn btn-small" title="Listen to pronunciation">🔊</button>
            <button id="edit-card-btn" class="btn btn-small">edit</button>
            <button id="delete-card-btn" class="btn btn-danger btn-small">delete card</button>
          </div>
          <form id="edit-card-form" class="edit-card-form" hidden>
            <label>front <input type="text" id="edit-front"></label>
            <label>back <input type="text" id="edit-back"></label>
            <label>context <input type="text" id="edit-context"></label>
            <div class="edit-card-actions">
              <button type="submit" class="btn btn-small">save</button>
              <button type="button" id="edit-cancel-btn" class="btn btn-small">cancel</button>
            </div>
          </form>
          <div id="no-cards-message" hidden>
            <p>no cards due for review. go chat with your cat!</p>
          </div>
        </div>
      </div>

      <!-- Goals page -->
      <div id="page-goals" class="page">
        <h2>goals</h2>
        <form id="add-goal-form" class="add-goal-form">
          <input type="text" id="add-goal-title" placeholder="title..." required>
          <select id="add-goal-type"></select>
          <button type="submit" class="btn btn-small">add</button>
        </form>
        <div id="goals-list"></div>
        <p id="no-goals" hidden>no goals yet. tell the cat what you want to watch or read!</p>
      </div>

      <!-- Settings page -->
      <div id="page-settings" class="page">
        <h2>settings</h2>
        <div id="settings-form">
          <label>name
            <input type="text" id="settings-name">
          </label>
          <label>known languages (comma separated ISO codes)
            <input type="text" id="settings-known-langs" placeholder="en, pl">
          </label>
          <label>target language (ISO code)
            <input type="text" id="settings-target-lang" placeholder="es">
          </label>
          <button id="settings-save" class="btn">save</button>
          <div id="settings-status"></div>
        </div>
        <hr>
        <button id="logout-btn" class="btn btn-danger">logout</button>
      </div>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
