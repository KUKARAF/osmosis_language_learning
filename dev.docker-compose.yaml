services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - db-data:/app/data
    environment:
      DEV_MODE: "true"
      DATABASE_URL: "sqlite+aiosqlite:///data/osmosis.db"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  db-data:
